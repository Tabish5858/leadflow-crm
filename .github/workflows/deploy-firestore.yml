name: Deploy Firestore Rules & Indexes

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
  workflow_dispatch:
    inputs:
      only_indexes:
        description: 'Deploy only indexes (skip rules)'
        required: false
        type: boolean
        default: false

env:
  FIREBASE_TOOLS_VERSION: '13.32.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required GCP APIs
        run: |
          gcloud services enable firebaserules.googleapis.com \
            --project leadflow-cde37

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_TOOLS_VERSION }}

      - name: Deploy Firestore Rules
        if: ${{ !inputs.only_indexes }}
        run: |
          firebase deploy \
            --project leadflow-cde37 \
            --only firestore:rules \
            --non-interactive

      - name: Deploy Firestore Indexes
        continue-on-error: true
        run: |
          firebase deploy \
            --project leadflow-cde37 \
            --only firestore:indexes \
            --non-interactive
        env:
          FIREBASE_SKIP_IAM_CHECK: "true"

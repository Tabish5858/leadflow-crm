name: "Task"
description: "Internal task or chore (for maintainers)"
title: "[Task]: "
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for internal tasks, refactoring, documentation updates, etc.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
